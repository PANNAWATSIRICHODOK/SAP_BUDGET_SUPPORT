<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Entry page for SAP Budget Support presentation"
    />
    <title>SAP Budget Support</title>
    <meta http-equiv="refresh" content="0; url=./pages/addons-budget-flow.html" />
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Sarabun", "Noto Sans Thai", "TH Sarabun New", "Leelawadee UI", "Segoe UI", sans-serif;
        color: #112d4e;
        background:
          radial-gradient(circle at top left, rgba(63, 114, 175, 0.08), transparent 28%),
          radial-gradient(circle at right 20%, rgba(219, 226, 239, 0.6), transparent 28%),
          linear-gradient(180deg, #f9f7f7 0%, #eef2f8 62%, #dbe2ef 100%);
      }

      main {
        width: min(calc(100% - 2rem), 760px);
        padding: 1.5rem;
        border: 1px solid rgba(17, 45, 78, 0.12);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 18px 40px rgba(17, 45, 78, 0.08);
      }

      h1 {
        margin: 0 0 0.8rem;
        font-size: clamp(1.8rem, 3vw, 2.4rem);
      }

      p {
        margin: 0;
        line-height: 1.7;
        color: #526884;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        margin-top: 1.2rem;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 2.4rem;
        padding: 0 1rem;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(17, 45, 78, 0.12);
        color: #112d4e;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
    <script>
      window.location.replace("./pages/addons-budget-flow.html");
    </script>
  </head>
  <body>
    <main>
      <h1>กำลังพาไปหน้า flow ของ addons budget</h1>
      <p>หากหน้าไม่เปลี่ยนอัตโนมัติ สามารถเลือกเปิดได้จากปุ่มด้านล่าง</p>
      <div class="links">
        <a href="./pages/addons-budget-flow.html">flow ของ addons budget</a>
        <a href="./pages/problem-report.html">รายงานปัญหา</a>
      </div>
    </main>
  </body>
</html>
